<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nyaya Decoder - Indian Legal Document Scanner</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #CB2129;
            --secondary: #F7944B;
            --accent: #BAD644;
            --dark: #323232;
            --light-gray: #BBBBBB;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .upload-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(186, 214, 68, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(203, 33, 41, 0.3);
            min-height: 48px;
            min-width: 48px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(203, 33, 41, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--accent), #8fb800);
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }

        .results-container {
            margin-top: 30px;
        }

        .result-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .result-badge {
            background: rgba(203, 33, 41, 0.3);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .result-section {
            margin-top: 12px;
        }

        .result-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .result-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .language-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .language-tab {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 40px;
        }

        .language-tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .language-tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.6;
        }

        .extracted-text {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .error-message {
            background: rgba(203, 33, 41, 0.2);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--accent);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-preview {
            margin-top: 16px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 12px;
            }

            .glass-card {
                padding: 16px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .upload-zone {
                padding: 30px 15px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            .result-header {
                flex-direction: column;
            }
        }
    </style>
</head>

                    mr: "वैवाहिक कार्यवाहीमध्ये, न्यायालय अल्पवयीन मुलांच्या कोठडी, पोषण आणि शिक्षणाबाबत अंतरिम/अंतिम आदेश पारित करू शकते. न्यायालय मुलाच्या कल्याणाला सर्वोच्च मानते. गैर-कोठडी पालकांना वाजवी प्रवेशाची परवानगी देऊ शकते."
                },
                category: "Family Law"
            },
            {
                id: "crpc_127",
                act: "Code of Criminal Procedure, 1973 (Legacy)",
                section: "Section 127",
                patterns: ["127", "section 127 crpc", "sec 127", "धारा 127", "कलम 127"],
                title: {
                    en: "Alteration of Maintenance Order",
                    hi: "भरण-पोषण आदेश में परिवर्तन",
                    mr: "पोषण आदेशात बदल"
                },
                explanation: {
                    en: "On proof of change in circumstances of any party, Magistrate may alter maintenance order by canceling, varying, or temporarily suspending it. Application can be made by person receiving/paying maintenance.",
                    hi: "किसी भी पक्ष की परिस्थितियों में परिवर्तन के प्रमाण पर, मजिस्ट्रेट भरण-पोषण आदेश को रद्द करके, बदलकर या अस्थायी रूप से निलंबित करके बदल सकता है। भरण-पोषण प्राप्त करने/देने वाला व्यक्ति आवेदन कर सकता है।",
                    mr: "कोणत्याही पक्षाच्या परिस्थितीत बदलाचा पुरावा मिळाल्यास, दंडाधिकारी पोषण आदेश रद्द करून, बदलून किंवा तात्पुरता निलंबित करून बदलू शकतो. पोषण मिळवणारी/देणारी व्यक्ती अर्ज करू शकते."
                },
                category: "Procedural Law"
            },
            {
                id: "crpc_482",
                act: "Code of Criminal Procedure, 1973 (Legacy)",
                section: "Section 482",
                patterns: ["482", "section 482 crpc", "sec 482", "धारा 482", "कलम 482", "quash fir"],
                title: {
                    en: "Inherent Powers of High Court",
                    hi: "उच्च न्यायालय की निहित शक्तियां",
                    mr: "उच्च न्यायालयाचे अंतर्निहित अधिकार"
                },
                explanation: {
                    en: "High Court has inherent power to prevent abuse of court process or secure ends of justice. Commonly used to quash FIR/complaints where allegations don't constitute offense, are frivolous/vexatious, or where compromise reached in compoundable offenses.",
                    hi: "उच्च न्यायालय के पास न्यायालय प्रक्रिया के दुरुपयोग को रोकने या न्याय के उद्देश्यों को सुरक्षित करने की निहित शक्ति है। आमतौर पर एफआईआर/शिकायतों को खारिज करने के लिए उपयोग किया जाता है जहां आरोप अपराध नहीं बनते, तुच्छ/परेशान करने वाले हैं, या जहां समझौता योग्य अपराधों में समझौता हो गया है।",
                    mr: "उच्च न्यायालयाला न्यायालयीन प्रक्रियेचा गैरवापर रोखण्यासाठी किंवा न्यायाचे ध्येय सुरक्षित करण्यासाठी अंतर्निहित अधिकार आहेत. सामान्यतः एफआयआर/तक्रारी रद्द करण्यासाठी वापरले जाते जेथे आरोप गुन्हा बनत नाहीत, क्षुल्लक/त्रासदायक आहेत किंवा जेथे जुळवून घेता येण्याजोग्या गुन्ह्यांमध्ये तडजोड झाली आहे."
                },
                category: "Procedural Law"
            }
        ];

        // Main App Component
        function NyayaDecoder() {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [progressText, setProgressText] = useState("");
            const [extractedText, setExtractedText] = useState("");
            const [matchedSections, setMatchedSections] = useState([]);
            const [showExtractedText, setShowExtractedText] = useState(false);
            const [error, setError] = useState("");
            const [dragOver, setDragOver] = useState(false);
            const [selectedLanguage, setSelectedLanguage] = useState("en");

            const fileInputRef = useRef(null);

            const handleFileSelect = (selectedFile) => {
                setFile(selectedFile);
                setExtractedText("");
                setMatchedSections([]);
                setError("");
                setProgress(0);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile) {
                    handleFileSelect(droppedFile);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setDragOver(true);
            };

            const handleDragLeave = () => {
                setDragOver(false);
            };

            const processPDF = async (file) => {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const numPages = pdf.numPages;
                    let fullText = "";

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                        setProgressText(`Processing page ${pageNum} of ${numPages}...`);
                        setProgress((pageNum / numPages) * 50);

                        const page = await pdf.getPage(pageNum);
                        const viewport = page.getViewport({ scale: 2.0 });

                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        await page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise;

                        const imageData = canvas.toDataURL('image/png');

                        const { data: { text } } = await Tesseract.recognize(
                            imageData,
                            'eng+hin+mar',
                            {
                                logger: m => {
                                    if (m.status === 'recognizing text') {
                                        setProgress(((pageNum - 1) / numPages) * 50 + (m.progress * 50 / numPages));
                                    }
                                }
                            }
                        );

                        fullText += text + "\n\n";

                        // Memory cleanup
                        canvas.width = 0;
                        canvas.height = 0;
                    }

                    return fullText;
                } catch (err) {
                    throw new Error(`PDF processing failed: ${err.message}`);
                }
            };

            const processImage = async (file) => {
                try {
                    setProgressText("Extracting text from image...");
                    const { data: { text } } = await Tesseract.recognize(
                        file,
                        'eng+hin+mar',
                        {
                            logger: m => {
                                if (m.status === 'recognizing text') {
                                    setProgress(m.progress * 100);
                                }
                            }
                        }
                    );
                    return text;
                } catch (err) {
                    throw new Error(`Image processing failed: ${err.message}`);
                }
            };

            const matchLegalSections = (text) => {
                const matches = [];
                const textLower = text.toLowerCase();

                LEGAL_DATABASE.forEach(section => {
                    const hasMatch = section.patterns.some(pattern => 
                        textLower.includes(pattern.toLowerCase())
                    );

                    if (hasMatch) {
                        matches.push(section);
                    }
                });

                return matches;
            };

            const handleScan = async () => {
                if (!file) return;

                setIsProcessing(true);
                setError("");
                setProgress(0);
                setExtractedText("");
                setMatchedSections([]);

                try {
                    let text = "";

                    if (file.type === "application/pdf") {
                        text = await processPDF(file);
                    } else if (file.type.startsWith("image/")) {
                        text = await processImage(file);
                    } else {
                        throw new Error("Unsupported file type");
                    }

                    setExtractedText(text);

                    setProgressText("Analyzing legal sections...");
                    setProgress(90);

                    const matches = matchLegalSections(text);
                    setMatchedSections(matches);

                    setProgress(100);
                    setProgressText("Complete!");

                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleReset = () => {
                setFile(null);
                setExtractedText("");
                setMatchedSections([]);
                setProgress(0);
                setError("");
                if (fileInputRef.current) {
                    fileInputRef.current.value = "";
                }
            };

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>⚖️ Nyaya Decoder</h1>
                        <p>Indian Legal Document Scanner - OCR + Pattern Matching</p>
                    </div>

                    <div className="glass-card">
                        <div 
                            className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
                            onClick={() => fileInputRef.current?.click()}
                            onDrop={handleDrop}
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                        >
                            <div className="upload-icon">📄</div>
                            <div className="upload-text">
                                {file ? file.name : "Click or Drop File Here"}
                            </div>
                            <div className="upload-subtext">
                                Supports PDF, JPG, PNG (Multi-page PDF supported)
                            </div>
                            <input
                                ref={fileInputRef}
                                type="file"
                                className="file-input"
                                accept=".pdf,.jpg,.jpeg,.png"
                                onChange={(e) => handleFileSelect(e.target.files[0])}
                            />
                        </div>

                        {file && !isProcessing && matchedSections.length === 0 && (
                            <div className="action-buttons">
                                <button className="btn" onClick={handleScan}>
                                    🔍 Scan & Analyze
                                </button>
                                <button className="btn btn-secondary" onClick={handleReset}>
                                    🔄 Reset
                                </button>
                            </div>
                        )}

                        {isProcessing && (
                            <div className="progress-container">
                                <div className="progress-bar">
                                    <div 
                                        className="progress-fill" 
                                        style={{ width: `${progress}%` }}
                                    />
                                </div>
                                <div className="progress-text">{progressText}</div>
                                <div className="spinner" />
                            </div>
                        )}

                        {error && (
                            <div className="error-message">
                                ❌ {error}
                            </div>
                        )}
                    </div>

                    {matchedSections.length > 0 && (
                        <div className="results-container">
                            <div className="glass-card">
                                <h2 style={{ marginBottom: '16px' }}>
                                    📋 Detected Legal Sections ({matchedSections.length})
                                </h2>

                                <div className="language-tabs">
                                    <div 
                                        className={`language-tab ${selectedLanguage === 'en' ? 'active' : ''}`}
                                        onClick={() => setSelectedLanguage('en')}
                                    >
                                        English
                                    </div>
                                    <div 
                                        className={`language-tab ${selectedLanguage === 'hi' ? 'active' : ''}`}
                                        onClick={() => setSelectedLanguage('hi')}
                                    >
                                        हिंदी
                                    </div>
                                    <div 
                                        className={`language-tab ${selectedLanguage === 'mr' ? 'active' : ''}`}
                                        onClick={() => setSelectedLanguage('mr')}
                                    >
                                        मराठी
                                    </div>
                                </div>

                                {matchedSections.map((section, idx) => (
                                    <div key={idx} className="result-card">
                                        <div className="result-header">
                                            <div className="result-title">
                                                {section.title[selectedLanguage]}
                                            </div>
                                            <div className="result-badge">
                                                {section.category}
                                            </div>
                                        </div>

                                        <div className="result-section">
                                            <div className="result-label">Act & Section:</div>
                                            <div className="result-content">
                                                <strong>{section.act}</strong> - {section.section}
                                            </div>
                                        </div>

                                        <div className="result-section">
                                            <div className="result-label">Explanation:</div>
                                            <div className="result-content">
                                                {section.explanation[selectedLanguage]}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                <div className="action-buttons">
                                    <button 
                                        className="btn btn-secondary" 
                                        onClick={() => setShowExtractedText(!showExtractedText)}
                                    >
                                        {showExtractedText ? '🙈 Hide' : '👁️ Show'} Extracted Text
                                    </button>
                                    <button className="btn" onClick={handleReset}>
                                        🔄 New Scan
                                    </button>
                                </div>

                                {showExtractedText && extractedText && (
                                    <div className="extracted-text">
                                        <strong>Extracted Text:</strong>
                                        <div style={{ marginTop: '8px' }}>
                                            {extractedText}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {matchedSections.length === 0 && extractedText && !isProcessing && (
                        <div className="glass-card">
                            <div className="no-results">
                                ℹ️ No legal sections detected in this document.
                                <br />
                                The document may not contain Indian legal references.
                            </div>
                            <div className="action-buttons">
                                <button 
                                    className="btn btn-secondary" 
                                    onClick={() => setShowExtractedText(!showExtractedText)}
                                >
                                    {showExtractedText ? '🙈 Hide' : '👁️ Show'} Extracted Text
                                </button>
                                <button className="btn" onClick={handleReset}>
                                    🔄 Try Another Document
                                </button>
                            </div>
                            {showExtractedText && (
                                <div className="extracted-text">
                                    <strong>Extracted Text:</strong>
                                    <div style={{ marginTop: '8px' }}>
                                        {extractedText}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NyayaDecoder />);
    </script>
</body>
</html>
