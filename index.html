    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #CB2129;
            --secondary: #F7944B;
            --accent: #BAD644;
            --dark: #323232;
            --light-gray: #BBBBBB;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .upload-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(186, 214, 68, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .file-input {
            display: none;
        }

        .controls-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-label {
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 600;
            opacity: 0.9;
        }

        .language-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }

        .lang-option {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--glass-border);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lang-option:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--secondary);
        }

        .lang-option.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(203, 33, 41, 0.3);
            min-height: 48px;
            min-width: 48px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(203, 33, 41, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--accent), #8fb800);
        }

            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
            margin-bottom: 8px;
        }

            border-radius: 50%;
            border-top: 3px solid var(--accent);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

            margin-top: 30px;

            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);

            margin-bottom: 16px;

            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .result-badge {
            background: rgba(203, 33, 41, 0.3);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .result-section {
            margin-top: 12px;
        }

        .result-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .result-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .language-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .language-tab {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 40px;
        }

        .language-tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .language-tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.6;
        }

        .extracted-text {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.6;
            word-break: break-word;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .error-message {
            background: rgba(203, 33, 41, 0.2);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .warning-message {
            background: rgba(247, 148, 75, 0.2);
            border: 1px solid var(--secondary);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .confidence-badge {
            background: rgba(186, 214, 68, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .ocr-stats {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.85rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-label {
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 12px;
            }

            .glass-card {
                padding: 16px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .upload-zone {
                padding: 30px 15px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            .result-header {
                flex-direction: column;
            }

            .language-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

                },
                explanation: {
                    en: "Either party may petition for divorce on grounds: adultery, cruelty, desertion for 2+ years, conversion, mental disorder, leprosy, venereal disease, renunciation, presumption of death. Court may decree divorce if satisfied.",
                    hi: "कोई भी पक्ष निम्न आधारों पर तलाक के लिए याचिका दायर कर सकता है: व्यभिचार, क्रूरता, 2+ वर्षों के लिए परित्याग, धर्मांतरण, मानसिक विकार, कुष्ठ रोग, यौन रोग, त्याग, मृत्यु की धारणा।",
                    mr: "कोणताही पक्ष खालील कारणांवर घटस्फोटासाठी याचिका दाखल करू शकतो: व्यभिचार, क्रूरता, 2+ वर्षे सोडून जाणे, धर्मांतर, मानसिक विकार, कुष्ठरोग, लैंगिक रोग, त्याग, मृत्यूची धारणा."
                },
                category: "Family Law"
            }
        ];

        // Image preprocessing function
        const preprocessImage = (canvas) => {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Enhance contrast for B&W documents
            const contrast = 1.5;
            const intercept = 128 * (1 - contrast) / 2;

            for (let i = 0; i < data.length; i += 4) {
                data[i] = data[i] * contrast + intercept;
                data[i + 1] = data[i + 1] * contrast + intercept;
                data[i + 2] = data[i + 2] * contrast + intercept;
            }

            ctx.putImageData(imageData, 0, 0);
        };

        // Main App Component
        function NyayaDecoder() {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [progressText, setProgressText] = useState("");
            const [extractedText, setExtractedText] = useState("");
            const [matchedSections, setMatchedSections] = useState([]);
            const [showExtractedText, setShowExtractedText] = useState(false);
            const [error, setError] = useState("");
            const [warning, setWarning] = useState("");
            const [dragOver, setDragOver] = useState(false);
            const [selectedLanguage, setSelectedLanguage] = useState("en");
            const [selectedOCRLanguage, setSelectedOCRLanguage] = useState("eng+hin+mar");
            const [ocrStats, setOcrStats] = useState(null);

            const fileInputRef = useRef(null);

            const handleFileSelect = (selectedFile) => {
                setFile(selectedFile);
                setExtractedText("");
                setMatchedSections([]);
                setError("");
                setWarning("");
                setProgress(0);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile) {
                    handleFileSelect(droppedFile);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setDragOver(true);
            };

            const handleDragLeave = () => {
                setDragOver(false);
            };

            const processPDF = async (file) => {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const numPages = pdf.numPages;
                    let fullText = "";
                    let totalProcessingTime = 0;

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                        setProgressText(`Rendering page ${pageNum} of ${numPages}...`);
                        setProgress((pageNum / (numPages * 2)) * 100);

                        const page = await pdf.getPage(pageNum);
                        // Increased scale from 2.0 to 5.0 for better clarity
                        const viewport = page.getViewport({ scale: 5.0 });

                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        await page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise;

                        // Apply image preprocessing
                        preprocessImage(canvas);

                        const imageData = canvas.toDataURL('image/png');

                        setProgressText(`Processing page ${pageNum} of ${numPages} with OCR...`);

                        const startTime = performance.now();
                        const { data: { text, confidence } } = await Tesseract.recognize(
                            imageData,
                            selectedOCRLanguage,
                            {
                                logger: m => {
                                    if (m.status === 'recognizing text') {
                                        setProgress(((pageNum - 1) / numPages) * 50 + (m.progress * 50 / numPages));
                                    }
                                }
                            }
                        );
                        const endTime = performance.now();
                        totalProcessingTime += (endTime - startTime);

                        fullText += `\n--- Page ${pageNum} ---\n${text}\n`;

                        // Memory cleanup - CRITICAL
                        canvas.width = 0;
                        canvas.height = 0;
                    }

                    setOcrStats({
                        totalPages: numPages,
                        processingTime: totalProcessingTime.toFixed(2)
                    });

                    return fullText;
                } catch (err) {
                    throw new Error(`PDF processing failed: ${err.message}`);
                }
            };

            const processImage = async (file) => {
                try {
                    setProgressText("Loading image...");
                    setProgress(10);

                    const reader = new FileReader();
                    const imagePromise = new Promise((resolve, reject) => {
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = img.width;
                                canvas.height = img.height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0);

                                // Apply preprocessing
                                preprocessImage(canvas);

                                const imageData = canvas.toDataURL('image/png');
                                resolve(imageData);
                            };
                            img.onerror = () => reject(new Error("Image loading failed"));
                            img.src = e.target.result;
                        };
                        reader.onerror = () => reject(new Error("File reading failed"));
                        reader.readAsDataURL(file);
                    });

                    const imageData = await imagePromise;

                    setProgressText("Extracting text from image...");
                    setProgress(30);

                    const startTime = performance.now();
                    const { data: { text, confidence } } = await Tesseract.recognize(
                        imageData,
                        selectedOCRLanguage,
                        {
                            logger: m => {
                                if (m.status === 'recognizing text') {
                                    setProgress(30 + (m.progress * 60));
                                }
                            }
                        }
                    );
                    const endTime = performance.now();

                    setOcrStats({
                        totalPages: 1,
                        processingTime: (endTime - startTime).toFixed(2)
                    });

                    return text;
                } catch (err) {
                    throw new Error(`Image processing failed: ${err.message}`);
                }
            };

            const matchLegalSections = (text) => {
                const matches = [];
                const textLower = text.toLowerCase();

                LEGAL_DATABASE.forEach(section => {
                    const hasMatch = section.patterns.some(pattern => 
                        textLower.includes(pattern.toLowerCase())
                    );

                    if (hasMatch) {
                        matches.push(section);
                    }
                });

                return matches;
            };

            const handleScan = async () => {
                if (!file) return;

                setIsProcessing(true);
                setError("");
                setWarning("");
                setProgress(0);
                setExtractedText("");
                setMatchedSections([]);
                setOcrStats(null);

                try {
                    let text = "";

                    if (file.type === "application/pdf") {
                        text = await processPDF(file);
                    } else if (file.type.startsWith("image/")) {
                        text = await processImage(file);
                    } else {
                        throw new Error("Unsupported file type. Please upload PDF or image (JPG/PNG).");
                    }

                    setExtractedText(text);

                    if (!text || text.trim().length < 10) {
                        setWarning("⚠️ OCR extracted very little text. The document quality might be poor or the text might not be recognized. Try adjusting the language settings or document angle.");
                    }

                    setProgressText("Analyzing legal sections...");
                    setProgress(95);

                    const matches = matchLegalSections(text);
                    setMatchedSections(matches);

                    if (matches.length === 0) {
                        setWarning("ℹ️ No legal sections detected. The document may not contain Indian legal references, or try different language settings.");
                    }

                    setProgress(100);
                    setProgressText("Complete!");

                } catch (err) {
                    setError(err.message);
                    setWarning("Try a higher quality document or switch language preferences.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleReset = () => {
                setFile(null);
                setExtractedText("");
                setMatchedSections([]);
                setProgress(0);
                setError("");
                setWarning("");
                setOcrStats(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = "";
                }
            };

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>⚖️ Nyaya Decoder v2</h1>
                        <p>Enhanced OCR - Indian Legal Document Scanner</p>
                    </div>

                    <div className="glass-card">
                        <div 
                            className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
                            onClick={() => fileInputRef.current?.click()}
                            onDrop={handleDrop}
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                        >
                            <div className="upload-icon">📄</div>
                            <div className="upload-text">
                                {file ? file.name : "Click or Drop File Here"}
                            </div>
                            <div className="upload-subtext">
                                Supports PDF, JPG, PNG (Multi-page PDF supported)
                            </div>
                            <input
                                ref={fileInputRef}
                                type="file"
                                className="file-input"
                                accept=".pdf,.jpg,.jpeg,.png"
                                onChange={(e) => handleFileSelect(e.target.files[0])}
                            />
                        </div>

                        {file && !isProcessing && matchedSections.length === 0 && (
                            <div className="controls-section">
                                <div className="control-group">
                                    <div className="control-label">📝 OCR Language Priority:</div>
                                    <div className="language-selector">
                                        <div 
                                            className={`lang-option ${selectedOCRLanguage === 'eng' ? 'active' : ''}`}
                                            onClick={() => setSelectedOCRLanguage('eng')}
                                        >
                                            English Only
                                        </div>
                                        <div 
                                            className={`lang-option ${selectedOCRLanguage === 'hin' ? 'active' : ''}`}
                                            onClick={() => setSelectedOCRLanguage('hin')}
                                        >
                                            हिंदी Only
                                        </div>
                                        <div 
                                            className={`lang-option ${selectedOCRLanguage === 'mar' ? 'active' : ''}`}
                                            onClick={() => setSelectedOCRLanguage('mar')}
                                        >
                                            मराठी Only
                                        </div>
                                        <div 
                                            className={`lang-option ${selectedOCRLanguage === 'eng+hin+mar' ? 'active' : ''}`}
                                            onClick={() => setSelectedOCRLanguage('eng+hin+mar')}
                                        >
                                            All Three
                                        </div>
                                    </div>
                                </div>

                                <div className="action-buttons">
                                    <button className="btn" onClick={handleScan}>
                                        🔍 Scan & Analyze
                                    </button>
                                    <button className="btn btn-secondary" onClick={handleReset}>
                                        🔄 Reset
                                    </button>
                                </div>
                            </div>
                        )}

                        {isProcessing && (
                            <div className="progress-container">
                                <div className="progress-bar">
                                    <div 
                                        className="progress-fill" 
                                        style={{ width: `${progress}%` }}
                                    />
                                </div>
                                <div className="progress-text">{progressText} ({Math.round(progress)}%)</div>
                                <div className="spinner" />
                            </div>
                        )}

                        {error && (
                            <div className="error-message">
                                ❌ Error: {error}
                            </div>
                        )}

                        {warning && (
                            <div className="warning-message">
                                {warning}
                            </div>
                        )}
                    </div>

                    {matchedSections.length > 0 && (
                        <div className="results-container">
                            <div className="glass-card">
                                <h2 style={{ marginBottom: '16px' }}>
                                    📋 Detected Legal Sections ({matchedSections.length})
                                </h2>

                                {ocrStats && (
                                    <div className="ocr-stats">
                                        <div className="stat-row">
                                            <span className="stat-label">Pages Scanned:</span>
                                            <span>{ocrStats.totalPages}</span>
                                        </div>
                                        <div className="stat-row">
                                            <span className="stat-label">Processing Time:</span>
                                            <span>{ocrStats.processingTime}ms</span>
                                        </div>
                                        <div className="stat-row">
                                            <span className="stat-label">OCR Language:</span>
                                            <span>{selectedOCRLanguage}</span>
                                        </div>
                                    </div>
                                )}

                                <div className="language-tabs">
                                    <div 
                                        className={`language-tab ${selectedLanguage === 'en' ? 'active' : ''}`}
                                        onClick={() => setSelectedLanguage('en')}
                                    >
                                        English
                                    </div>
                                    <div 
                                        className={`language-tab ${selectedLanguage === 'hi' ? 'active' : ''}`}
                                        onClick={() => setSelectedLanguage('hi')}
                                    >
                                        हिंदी
                                    </div>
                                    <div 
                                        className={`language-tab ${selectedLanguage === 'mr' ? 'active' : ''}`}
                                        onClick={() => setSelectedLanguage('mr')}
                                    >
                                        मराठी
                                    </div>
                                </div>

                                {matchedSections.map((section, idx) => (
                                    <div key={idx} className="result-card">
                                        <div className="result-header">
                                            <div className="result-title">
                                                {section.title[selectedLanguage]}
                                            </div>
                                            <div className="result-badge">
                                                {section.category}
                                            </div>
                                        </div>

                                        <div className="result-section">
                                            <div className="result-label">Act & Section:</div>
                                            <div className="result-content">
                                                <strong>{section.act}</strong> - {section.section}
                                            </div>
                                        </div>

                                        <div className="result-section">
                                            <div className="result-label">Explanation:</div>
                                            <div className="result-content">
                                                {section.explanation[selectedLanguage]}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                <div className="action-buttons">
                                    <button 
                                        className="btn btn-secondary" 
                                        onClick={() => setShowExtractedText(!showExtractedText)}
                                    >
                                        {showExtractedText ? '🙈 Hide' : '👁️ Show'} Extracted Text
                                    </button>
                                    <button className="btn" onClick={handleReset}>
                                        🔄 New Scan
                                    </button>
                                </div>

                                {showExtractedText && extractedText && (
                                    <div className="extracted-text">
                                        <strong>Extracted Text:</strong>
                                        <div style={{ marginTop: '8px' }}>
                                            {extractedText}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {matchedSections.length === 0 && extractedText && !isProcessing && (
                        <div className="glass-card">
                            <div className="no-results">
                                ℹ️ No legal sections detected in this document.
                                <br />
                                The document may not contain Indian legal references.
                                <br />
                                <strong>Troubleshooting:</strong>
                                <br />
                                1. Try selecting a different OCR language
                                <br />
                                2. Ensure the document is clear and readable
                                <br />
                                3. Check that the text is printed (not handwritten)
                            </div>
                            <div className="action-buttons">
                                <button 
                                    className="btn btn-secondary" 
                                    onClick={() => setShowExtractedText(!showExtractedText)}
                                >
                                    {showExtractedText ? '🙈 Hide' : '👁️ Show'} Extracted Text
                                </button>
                                <button className="btn" onClick={handleReset}>
                                    🔄 Try Another Document
                                </button>
                            </div>
                            {showExtractedText && (
                                <div className="extracted-text">
                                    <strong>Extracted Text:</strong>
                                    <div style={{ marginTop: '8px' }}>
                                        {extractedText}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NyayaDecoder />);
    </script>
</body>
</html>
