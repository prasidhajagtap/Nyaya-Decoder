<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya Decoder: Indian Family Court Notice Translator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-main: #c9d1d9;
            --text-accent: #58a6ff;
            --danger-high: #ff7b72;
            --danger-med: #d29922;
            --danger-low: #3fb950;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        h1 { font-size: 1.6rem; color: #f0f6fc; margin-bottom: 5px; }
        header p { font-size: 0.9rem; color: #8b949e; margin: 0; }
        .upload-section {
            background: var(--card-bg);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .hidden-input { display: none; }
        .upload-btn {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 6px;
            color: var(--text-accent);
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }
        #progress-container {
            margin-top: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }
        .progress-bar-bg {
            background: #21262d;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }
        #progress-bar {
            background: var(--text-accent);
            width: 0%;
            height: 100%;
            transition: width 0.2s ease;
        }
        #result-box {
            margin-top: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(8px);
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .badge-critical { background: rgba(255,123,114,0.2); color: var(--danger-high); border: 1px solid var(--danger-high); }
        .badge-medium { background: rgba(210,153,34,0.2); color: var(--danger-med); border: 1px solid var(--danger-med); }
        .badge-low { background: rgba(63,185,80,0.2); color: var(--danger-low); border: 1px solid var(--danger-low); }
        .explanation-item {
            border-left: 3px solid var(--text-accent);
            padding-left: 12px;
            margin-bottom: 20px;
        }
        .explanation-item h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #f0f6fc; }
        .explanation-item p { margin: 0; font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>न्याय Decoder</h1>
            <p>Court Notice Reader • English | हिंदी | मराठी</p>
        </header>

        <main>
            <div class="upload-section">
                <input type="file" id="document-selector" accept="image/*,application/pdf" class="hidden-input">
                <label for="document-selector" class="upload-btn">📁 Choose Court Photo or PDF</label>
                <p style="font-size: 0.8rem; color:#8b949e; margin-top:10px; margin-bottom:0;">Supports multi-page documents safely</p>
            </div>

            <div id="progress-container" class="hidden">
                <span id="progress-status">Loading processing engines...</span>
                <div class="progress-bar-bg"><div id="progress-bar"></div></div>
            </div>

            <div id="result-box" class="hidden">
                <div id="danger-badge" class="badge"></div>
                <div id="simple-explanation"></div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
