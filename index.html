<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya Decoder: Indian Family Law Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>न्याय Decoder</h1>
            <p>Indian Family Court Notice Analyzer • MH & National</p>
        </header>

        <main>
            <div class="upload-section">
                <input type="file" id="document-selector" accept="image/*,application/pdf" class="hidden-input">
                <label for="document-selector" class="upload-btn">📷 Scan Photo or Upload PDF</label>
                <div class="subtext">Supports multi-language notices (Eng + हिंदी + मराठी)</div>
            </div>

            <div id="progress-container" class="hidden">
                <div id="progress-status">Preparing document pipeline...</div>
                <div class="progress-bar-bg">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="result-box" class="hidden">
                <div id="danger-badge" class="badge"></div>
                <div id="simple-explanation"></div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
