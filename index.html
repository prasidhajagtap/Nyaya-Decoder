<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyaya Decoder | Strategic Legal Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f8f9fa;
      --surface:   #ffffff;
      --surface2:  #f1f3f7;
      --border:    #e2e8f0;
      --t1:        #0f172a;
      --t2:        #475569;
      --t3:        #94a3b8;
      --accent:    #1e3a8a;
      --accent2:   #eff6ff;
      --jbg:       #fcf8f2;
      --jborder:   #eede7b;
      --jtxt:      #855d0a;
      --sbg:       #fff1f2;
      --sborder:   #fecdd3;
      --stxt:      #9f1239;
      --shadow:    0 4px 20px rgba(15, 23, 42, 0.05);
    }
    [data-theme="dark"] {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #334155;
      --border:    #475569;
      --t1:        #f8fafc;
      --t2:        #cbd5e1;
      --t3:        #64748b;
      --accent:    #3b82f6;
      --accent2:   #1e3a8a;
      --jbg:       #2a2415;
      --jborder:   #715c1e;
      --jtxt:      #fef08a;
      --sbg:       #4c0519;
      --sborder:   #9f1239;
      --stxt:      #fecdd3;
      --shadow:    0 4px 25px rgba(0, 0, 0, 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--t1); min-height: 100vh; transition: background .3s, color .3s; padding-bottom: 5rem; }

    nav { position: sticky; top: 0; z-index: 50; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 65px; box-shadow: var(--shadow); }
    .logo { display: flex; align-items: center; gap: .6rem; text-decoration: none; color: var(--t1); font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; }
    .logo span { color: var(--accent); }
    .tog { background: var(--surface2); border: 1px solid var(--border); border-radius: 50px; padding: .4rem .9rem; cursor: pointer; font-size: .8rem; color: var(--t2); font-weight: 500; }

    .hero { max-width: 800px; margin: 0 auto; padding: 4rem 1.5rem 2rem; text-align: center; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 400; line-height: 1.2; margin-bottom: 1.5rem; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 600; }

    .sw { max-width: 650px; margin: 0 auto; }
    .sb { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: .4rem .4rem .4rem 1.2rem; box-shadow: var(--shadow); gap: .6rem; }
    #q { flex: 1; border: none; outline: none; background: transparent; font-family: 'Outfit', sans-serif; font-size: .95rem; color: var(--t1); padding: .7rem 0; }
    .sbtn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: .7rem 1.6rem; font-size: .9rem; font-weight: 500; cursor: pointer; }
    
    .cat-bar { display: flex; justify-content: center; gap: .5rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .cat-btn { background: var(--surface); border: 1px solid var(--border); color: var(--t2); padding: .5rem 1rem; border-radius: 8px; font-size: .85rem; cursor: pointer; font-weight: 500; }
    .cat-btn.active, .cat-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .st { max-width: 700px; margin: 2rem auto; padding: 0 1.5rem; text-align: center; display: none; }
    .st.on { display: block; }
    .errtxt { color: #ef4444; font-size: .95rem; background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); }

    .res-list { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; display: flex; flex-direction: column; gap: 2.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
    .ch { padding: 1.6rem 1.8rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 1.2rem; background: linear-gradient(to bottom, var(--surface), var(--bg)); }
    .ctitle { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: var(--t1); }
    .cbadge { background: var(--accent); color: #fff; font-size: .75rem; font-weight: 600; padding: .35rem .85rem; border-radius: 8px; text-transform: uppercase; }
    
    .cb { padding: 1.8rem; display: flex; flex-direction: column; gap: 1.8rem; }
    .lblock { background: var(--surface2); border-left: 4px solid var(--t2); padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; }
    .eblock { background: var(--accent2); border-left: 4px solid var(--accent); padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; }
    .blabel { font-size: .75rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--t3); margin-bottom: .5rem; }
    .eblock .blabel { color: var(--accent); }
    .ltext { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.7; color: var(--t2); font-style: italic; }
    .etext { font-size: .95rem; line-height: 1.7; color: var(--t1); }
    
    /* Precedents Section Setup */
    .jblock { background: var(--jbg); border: 1px dashed var(--jborder); padding: 1.2rem; border-radius: 12px; }
    .jblock .blabel { color: var(--jtxt); opacity: 0.9; }
    .j-item { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.06); }
    .j-item:first-child { margin-top: .5rem; padding-top: 0; border-top: none; }
    .j-cite { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--t1); margin-bottom: .25rem; }
    .j-rule { font-size: .9rem; line-height: 1.6; color: var(--t2); }

    /* Next Steps Protocols */
    .sblock { background: var(--sbg); border: 1px dashed var(--sborder); padding: 1.2rem; border-radius: 12px; }
    .sblock .blabel { color: var(--stxt); opacity: 0.9; }
    .s-list { margin-top: .6rem; padding-left: 1.2rem; display: flex; flex-direction: column; gap: .6rem; }
    .s-item { font-size: .92rem; line-height: 1.6; color: var(--t1); }
    .s-item strong { color: var(--stxt); font-weight: 500; }

    .tbar { border-top: 1px solid var(--border); padding: 1rem 1.8rem; display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; background: var(--surface); }
    .tlbl { font-size: .8rem; color: var(--t2); }
    .tbtn { background: var(--surface2); border: 1px solid var(--border); color: var(--t2); font-size: .8rem; font-weight: 500; padding: .4rem .9rem; border-radius: 6px; cursor: pointer; }
    .tbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .tlwrap { padding: 0 1.8rem 1.8rem; display: none; }
    .tlwrap.on { display: block; }
    .tlcard { background: var(--surface2); border-left: 4px solid #10b981; border-radius: 0 12px 12px 0; padding: 1.2rem 1.5rem; }
    .tltext { font-size: .95rem; line-height: 1.7; color: var(--t1); }
    
    .loading { text-align: center; color: var(--t3); padding: 2rem; font-size: 1rem; display: none; }
    .loading.on { display: block; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="#">Nyaya<span>Decoder</span></a>
  <button class="tog" onclick="toggleTheme()">🌙 Dark Mode</button>
</nav>

<section class="hero">
  <h1>Statute Analyzer & <em>Defense Precedents</em> Portal</h1>
  <div class="sw">
    <div class="sb">
      <input type="text" id="q" placeholder="Type sections (e.g., '498A', 'BNS 85', 'Maintenance')..." onkeyup="handleSearch()" autocomplete="off" />
      <button class="sbtn" onclick="handleSearch()">Search</button>
    </div>
    <div class="cat-bar">
      <button class="cat-btn active" id="cat-all" onclick="filterCategory('all')">All Statutes</button>
      <button class="cat-btn" id="cat-family" onclick="filterCategory('family-court')">Family & Matrimonial</button>
    </div>
  </div>
</section>

<div class="loading" id="loader">Syncing legal defense nodes...</div>

<div class="st" id="er">
  <p class="errtxt" id="erMsg">No regulations match your framework query.</p>
</div>

<section class="res-list" id="resultsContainer"></section>

<script>
  let DB = [];
  let currentCategory = 'all';
  let theme = 'light';

  async function initDatabase() {
    const loader = document.getElementById('loader');
    loader.classList.add('on');
    try {
      const response = await fetch('laws.json');
      DB = await response.json();
      renderCards(DB);
    } catch (err) {
      document.getElementById('er').classList.add('on');
      document.getElementById('erMsg').textContent = "Failed to synchronize database. Verify laws.json structure.";
    } finally {
      loader.classList.remove('on');
    }
  }

  function renderCards(data) {
    const container = document.getElementById('resultsContainer');
    const errorBox = document.getElementById('er');
    container.innerHTML = '';
    
    if (data.length === 0) {
      errorBox.classList.add('on');
      return;
    }
    errorBox.classList.remove('on');

    data.forEach((law) => {
      // Formulate Judgments HTML block dynamically
      let judgmentsHTML = '';
      if (law.favorableJudgments && law.favorableJudgments.length > 0) {
        judgmentsHTML = `
          <div class="jblock">
            <div class="blabel">⚖️ Precedents / Judgments (Favorable to Husband)</div>
            <div>
              ${law.favorableJudgments.map(j => `
                <div class="j-item">
                  <div class="j-cite">${j.citation}</div>
                  <div class="j-rule">${j.ruling}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Formulate Next Steps HTML list block dynamically
      let stepsHTML = '';
      if (law.immediateActionPlan && law.immediateActionPlan.length > 0) {
        stepsHTML = `
          <div class="sblock">
            <div class="blabel">🚨 Immediate Action Protocol (Next Steps)</div>
            <ol class="s-list">
              ${law.immediateActionPlan.map(step => `
                <li class="s-item">${step}</li>
              `).join('')}
            </ol>
          </div>
        `;
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="ch">
          <div class="ctitle">${law.lawTitle}</div>
          <div class="cbadge">${law.section}</div>
        </div>
        <div class="cb">
          <div class="lblock">
            <div class="blabel">Statutory Provisions (Bare Act)</div>
            <div class="ltext">${law.actualText}</div>
          </div>
          <div class="eblock">
            <div class="blabel">Plain English Meaning</div>
            <div class="etext">${law.simpleExplanation}</div>
          </div>
          
          ${judgmentsHTML}
          ${stepsHTML}
        </div>
        <div class="tbar">
          <span class="tlbl">Contextual Translation:</span>
          <button class="tbtn" onclick="toggleLanguage('${law.id}', 'hi', this)">Hindi (हिंदी)</button>
          <button class="tbtn" onclick="toggleLanguage('${law.id}', 'mr', this)">Marathi (मराठी)</button>
        </div>
        <div class="tlwrap" id="tl-${law.id}">
          <div class="tlcard">
            <div class="tltext" id="tl-txt-${law.id}"></div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function handleSearch() {
    const query = document.getElementById('q').value.toLowerCase().trim();
    const filtered = DB.filter(item => {
      const matchesCategory = (currentCategory === 'all' || item.category === currentCategory);
      const matchesQuery = !query || 
                           item.keywords.some(k => query.includes(k) || k.includes(query)) ||
                           item.lawTitle.toLowerCase().includes(query);
      return matchesCategory && matchesQuery;
    });
    renderCards(filtered);
  }

  function filterCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`cat-${cat.split('-')[1] || cat}`).classList.add('active');
    handleSearch();
  }

  function toggleLanguage(id, lang, btn) {
    const wrap = document.getElementById(`tl-${id}`);
    const txt = document.getElementById(`tl-txt-${id}`);
    const lawItem = DB.find(item => item.id === id);

    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      wrap.classList.remove('on');
      return;
    }

    btn.parentElement.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    txt.textContent = lawItem.translations[lang].text;
    wrap.classList.add('on');
  }

  function toggleTheme() {
    theme = theme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelector('.tog').textContent = theme === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
  }

  window.onload = initDatabase;
</script>
</body>
</html>
