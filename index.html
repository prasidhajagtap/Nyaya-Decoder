        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .upload-zone {

            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;

            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;

        .btn:hover {

                    mr: "हुंडा देणे किंवा घेणे 5 ते 10 वर्षांचा कारावास आणि कमीतकमी 15,000 रुपयांचा दंड."
                },
                category: "Protection Acts"
            }

        // Image preprocessing for Marathi
        const preprocessImageForMarathi = (canvas) => {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Binarization + Contrast enhancement for Devanagari
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                const bw = gray > 150 ? 255 : 0;
                data[i] = data[i + 1] = data[i + 2] = bw;
            }

            ctx.putImageData(imageData, 0, 0);
        };

        // Main App
        function NyayaDecoder() {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [progressText, setProgressText] = useState("");
            const [extractedText, setExtractedText] = useState("");
            const [matchedSections, setMatchedSections] = useState([]);
            const [showExtractedText, setShowExtractedText] = useState(false);
            const [error, setError] = useState("");
            const [dragOver, setDragOver] = useState(false);
            const [selectedLanguage, setSelectedLanguage] = useState("en");
            const [selectedOCRLanguage, setSelectedOCRLanguage] = useState("mar");
            const [activeTab, setActiveTab] = useState("scan");
            const [searchQuery, setSearchQuery] = useState("");
            const [searchResults, setSearchResults] = useState([]);
            const [ocrStats, setOcrStats] = useState(null);

            const fileInputRef = useRef(null);

            const handleFileSelect = (selectedFile) => {
                setFile(selectedFile);
                setExtractedText("");
                setMatchedSections([]);
                setError("");
                setProgress(0);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile) handleFileSelect(droppedFile);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setDragOver(true);
            };

            const handleDragLeave = () => {
                setDragOver(false);
            };

            const processPDF = async (file) => {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const numPages = pdf.numPages;
                    let fullText = "";

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                        setProgressText(`Rendering page ${pageNum} of ${numPages}...`);
                        setProgress((pageNum / (numPages * 2)) * 100);

                        const page = await pdf.getPage(pageNum);
                        const viewport = page.getViewport({ scale: 5.0 });

                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        await page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise;

                        preprocessImageForMarathi(canvas);
                        const imageData = canvas.toDataURL('image/png');

                        setProgressText(`Processing page ${pageNum} of ${numPages} with OCR...`);

                        const startTime = performance.now();
                        const { data: { text } } = await Tesseract.recognize(
                            imageData,
                            selectedOCRLanguage,
                            {
                                logger: m => {
                                    if (m.status === 'recognizing text') {
                                        setProgress(((pageNum - 1) / numPages) * 50 + (m.progress * 50 / numPages));
                                    }
                                }
                            }
                        );
                        const endTime = performance.now();

                        fullText += `\n--- Page ${pageNum} ---\n${text}\n`;

                        canvas.width = 0;
                        canvas.height = 0;
                    }

                    setOcrStats({
                        totalPages: numPages,
                        processingTime: (endTime - startTime).toFixed(2),
                        language: selectedOCRLanguage
                    });

                    return fullText;
                } catch (err) {
                    throw new Error(`PDF processing failed: ${err.message}`);
                }
            };

            const processImage = async (file) => {
                try {
                    setProgressText("Loading image...");
                    setProgress(10);

                    const reader = new FileReader();
                    const imagePromise = new Promise((resolve, reject) => {
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = img.width;
                                canvas.height = img.height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0);
                                preprocessImageForMarathi(canvas);
                                const imageData = canvas.toDataURL('image/png');
                                resolve(imageData);
                            };
                            img.onerror = () => reject(new Error("Image loading failed"));
                            img.src = e.target.result;
                        };
                        reader.onerror = () => reject(new Error("File reading failed"));
                        reader.readAsDataURL(file);
                    });

                    const imageData = await imagePromise;

                    setProgressText("Extracting text from image...");
                    setProgress(30);

                    const startTime = performance.now();
                    const { data: { text } } = await Tesseract.recognize(
                        imageData,
                        selectedOCRLanguage,
                        {
                            logger: m => {
                                if (m.status === 'recognizing text') {
                                    setProgress(30 + (m.progress * 60));
                                }
                            }
                        }
                    );
                    const endTime = performance.now();

                    setOcrStats({
                        totalPages: 1,
                        processingTime: (endTime - startTime).toFixed(2),
                        language: selectedOCRLanguage
                    });

                    return text;
                } catch (err) {
                    throw new Error(`Image processing failed: ${err.message}`);
                }
            };

            const matchLegalSections = (text) => {
                const matches = [];
                const textLower = text.toLowerCase();

                LEGAL_DATABASE.forEach(section => {
                    const hasMatch = section.patterns.some(pattern => 
                        textLower.includes(pattern.toLowerCase())
                    );

                    if (hasMatch) {
                        matches.push(section);
                    }
                });

                return matches;
            };

            const searchLegalDatabase = (query) => {
                const lowerQuery = query.toLowerCase();
                const results = LEGAL_DATABASE.filter(section => 
                    section.section.toLowerCase().includes(lowerQuery) ||
                    section.act.toLowerCase().includes(lowerQuery) ||
                    section.title.en.toLowerCase().includes(lowerQuery) ||
                    section.title.hi.toLowerCase().includes(lowerQuery) ||
                    section.title.mr.toLowerCase().includes(lowerQuery)
                );
                setSearchResults(results);
            };

            const handleScan = async () => {
                if (!file) return;

                setIsProcessing(true);
                setError("");
                setProgress(0);
                setExtractedText("");
                setMatchedSections([]);
                setOcrStats(null);

                try {
                    let text = "";

                    if (file.type === "application/pdf") {
                        text = await processPDF(file);
                    } else if (file.type.startsWith("image/")) {
                        text = await processImage(file);
                    } else {
                        throw new Error("Unsupported file type");
                    }

                    setExtractedText(text);
                    setProgress(95);
                    setProgressText("Analyzing legal sections...");

                    const matches = matchLegalSections(text);
                    setMatchedSections(matches);

                    setProgress(100);
                    setProgressText("Complete!");

                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleReset = () => {
                setFile(null);
                setExtractedText("");
                setMatchedSections([]);
                setProgress(0);
                setError("");
                setOcrStats(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = "";
                }
            };

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>⚖️ Nyaya Decoder v3</h1>
                        <p>Marathi-Optimized Legal Document Scanner</p>
                    </div>

                    <div className="tabs-container">
                        <div className="tab-buttons">
                            <div className={`tab-button ${activeTab === 'scan' ? 'active' : ''}`} onClick={() => setActiveTab('scan')}>
                                🔍 Scan Document
                            </div>
                            <div className={`tab-button ${activeTab === 'search' ? 'active' : ''}`} onClick={() => setActiveTab('search')}>
                                📚 Search Database
                            </div>
                        </div>
                    </div>

                    {activeTab === 'scan' && (
                        <>
                            <div className="glass-card">
                                <div 
                                    className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
                                    onClick={() => fileInputRef.current?.click()}
                                    onDrop={handleDrop}
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                >
                                    <div className="upload-icon">📄</div>
                                    <div style={{fontSize: "1.1rem", marginBottom: "8px"}}>
                                        {file ? file.name : "Click or Drop File Here"}
                                    </div>
                                    <div style={{fontSize: "0.85rem", opacity: "0.6"}}>
                                        PDF, JPG, PNG (Multi-page supported)
                                    </div>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        style={{display: "none"}}
                                        accept=".pdf,.jpg,.jpeg,.png"
                                        onChange={(e) => handleFileSelect(e.target.files[0])}
                                    />
                                </div>

                                {file && !isProcessing && matchedSections.length === 0 && (
                                    <div className="controls-section">
                                        <div className="control-group">
                                            <div className="control-label">📝 OCR Language (Optimized for Marathi):</div>
                                            <div className="lang-selector">
                                                <div 
                                                    className={`lang-option ${selectedOCRLanguage === 'eng' ? 'active' : ''}`}
                                                    onClick={() => setSelectedOCRLanguage('eng')}
                                                >
                                                    English
                                                </div>
                                                <div 
                                                    className={`lang-option ${selectedOCRLanguage === 'hin' ? 'active' : ''}`}
                                                    onClick={() => setSelectedOCRLanguage('hin')}
                                                >
                                                    हिंदी
                                                </div>
                                                <div 
                                                    className={`lang-option ${selectedOCRLanguage === 'mar' ? 'active' : ''}`}
                                                    onClick={() => setSelectedOCRLanguage('mar')}
                                                >
                                                    मराठी ⭐
                                                </div>
                                                <div 
                                                    className={`lang-option ${selectedOCRLanguage === 'eng+hin+mar' ? 'active' : ''}`}
                                                    onClick={() => setSelectedOCRLanguage('eng+hin+mar')}
                                                >
                                                    All Three
                                                </div>
                                            </div>
                                        </div>

                                        <div className="action-buttons">
                                            <button className="btn" onClick={handleScan}>
                                                🔍 Scan & Analyze
                                            </button>
                                            <button className="btn btn-secondary" onClick={handleReset}>
                                                🔄 Reset
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {isProcessing && (
                                    <div className="progress-container">
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{ width: `${progress}%` }} />
                                        </div>
                                        <div className="progress-text">{progressText} ({Math.round(progress)}%)</div>
                                        <div className="spinner" />
                                    </div>
                                )}

                                {error && <div className="error-message">❌ {error}</div>}
                            </div>

                            {matchedSections.length > 0 && (
                                <div className="results-container">
                                    <div className="glass-card">
                                        <h2 style={{ marginBottom: '16px' }}>📋 Detected Sections ({matchedSections.length})</h2>

                                        {ocrStats && (
                                            <div className="ocrStats">
                                                <div className="stat-row"><span className="stat-label">Pages:</span><span>{ocrStats.totalPages}</span></div>
                                                <div className="stat-row"><span className="stat-label">Time:</span><span>{ocrStats.processingTime}ms</span></div>
                                                <div className="stat-row"><span className="stat-label">Language:</span><span>{ocrStats.language}</span></div>
                                            </div>
                                        )}

                                        <div className="language-tabs">
                                            {['en', 'hi', 'mr'].map(lang => (
                                                <div 
                                                    key={lang}
                                                    className={`language-tab ${selectedLanguage === lang ? 'active' : ''}`}
                                                    onClick={() => setSelectedLanguage(lang)}
                                                >
                                                    {lang === 'en' ? 'English' : lang === 'hi' ? 'हिंदी' : 'मराठी'}
                                                </div>
                                            ))}
                                        </div>

                                        {matchedSections.map((section, idx) => (
                                            <div key={idx} className="result-card">
                                                <div className="result-header">
                                                    <div className="result-title">{section.title[selectedLanguage]}</div>
                                                    <div className="result-badges">
                                                        <div className="result-badge">{section.category}</div>
                                                    </div>
                                                </div>

                                                <div className="result-section">
                                                    <div className="result-label">Act & Section:</div>
                                                    <div className="result-content"><strong>{section.act}</strong> - {section.section}</div>
                                                </div>

                                                <div className="result-section">
                                                    <div className="result-label">Explanation:</div>
                                                    <div className="result-content">{section.explanation[selectedLanguage]}</div>
                                                </div>
                                            </div>
                                        ))}

                                        <div className="action-buttons">
                                            <button className="btn btn-secondary" onClick={() => setShowExtractedText(!showExtractedText)}>
                                                {showExtractedText ? '🙈 Hide' : '👁️ Show'} Extracted Text
                                            </button>
                                            <button className="btn" onClick={handleReset}>
                                                🔄 New Scan
                                            </button>
                                        </div>

                                        {showExtractedText && extractedText && (
                                            <div className="extracted-text">
                                                <strong>Extracted Text:</strong>
                                                <div style={{ marginTop: '8px' }}>{extractedText}</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </>
                    )}

                    {activeTab === 'search' && (
                        <div className="glass-card">
                            <h2 style={{ marginBottom: '16px' }}>🔎 Search Legal Database</h2>
                            <div className="control-group">
                                <div className="control-label">Search by Section Number, Act Name, or Keyword:</div>
                                <input
                                    type="text"
                                    className="search-input"
                                    placeholder="e.g., 'Section 61', 'CrPC 125', 'marriage', 'maintenance', etc."
                                    value={searchQuery}
                                    onChange={(e) => {
                                        setSearchQuery(e.target.value);
                                        if (e.target.value.trim()) {
                                            searchLegalDatabase(e.target.value);
                                        } else {
                                            setSearchResults([]);
                                        }
                                    }}
                                />
                            </div>

                            {searchQuery && (
                                <div className="search-results">
                                    {searchResults.length > 0 ? (
                                        <>
                                            <h3 style={{marginBottom: "16px"}}>Found {searchResults.length} Result(s)</h3>

                                            <div className="language-tabs">
                                                {['en', 'hi', 'mr'].map(lang => (
                                                    <div 
                                                        key={lang}
                                                        className={`language-tab ${selectedLanguage === lang ? 'active' : ''}`}
                                                        onClick={() => setSelectedLanguage(lang)}
                                                    >
                                                        {lang === 'en' ? 'English' : lang === 'hi' ? 'हिंदी' : 'मराठी'}
                                                    </div>
                                                ))}
                                            </div>

                                            {searchResults.map((section, idx) => (
                                                <div key={idx} className="result-card">
                                                    <div className="result-header">
                                                        <div className="result-title">{section.title[selectedLanguage]}</div>
                                                        <div className="result-badges">
                                                            <div className="result-badge">{section.category}</div>
                                                        </div>
                                                    </div>

                                                    <div className="result-section">
                                                        <div className="result-label">Act & Section:</div>
                                                        <div className="result-content"><strong>{section.act}</strong> - {section.section}</div>
                                                    </div>

                                                    <div className="result-section">
                                                        <div className="result-label">Explanation:</div>
                                                        <div className="result-content">{section.explanation[selectedLanguage]}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    ) : (
                                        <div className="no-results">
                                            No sections found matching "{searchQuery}"
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NyayaDecoder />);
    </script>
</body>
</html>
